name: CD - Deploy de Artefatos

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Baixar dados do Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p data/raw
          kaggle competitions download -c house-prices-advanced-regression-techniques -p data/raw
          unzip -o data/raw/house-prices-advanced-regression-techniques.zip -d data/raw

      - name: Gerar arquivo VERSION
        run: |
          python scripts/write_version.py

      - name: Executar notebooks
        run: |
          papermill notebooks/01_missing_values.ipynb notebooks/01_missing_values_out.ipynb
          papermill notebooks/02_categorical_variables.ipynb notebooks/02_categorical_variables_out.ipynb

      - name: Upload de artefatos versionados
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: |
            VERSION
            outputs/
            models/
            notebooks/*_out.ipynb
