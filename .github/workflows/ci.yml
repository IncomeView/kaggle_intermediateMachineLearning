name: CI - Kaggle Intermediate ML

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install kaggle papermill

    - name: Configure Kaggle credentials
      run: |
        mkdir -p ~/.kaggle
        echo "{\"username\":\"${{ secrets.KAGGLE_USERNAME }}\",\"key\":\"${{ secrets.KAGGLE_KEY }}\"}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json

    - name: Download Kaggle dataset
      run: |
        mkdir -p data/raw
        kaggle competitions download -c house-prices-advanced-regression-techniques -p data/raw
        unzip data/raw/house-prices-advanced-regression-techniques.zip -d data/raw

    - name: Execute notebook 01
      run: |
        papermill notebooks/01_missing_values.ipynb \
                 notebooks/01_missing_values_out.ipynb

    - name: Execute notebook 02
      run: |
        papermill notebooks/02_categorical_variables.ipynb \
                 notebooks/02_categorical_variables_out.ipynb