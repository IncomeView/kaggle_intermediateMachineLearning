name: CI - Kaggle Intermediate ML

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute notebook 01
      run: |
        pip install papermill
        papermill notebooks/01_missing_values.ipynb \
                 notebooks/01_missing_values_out.ipynb

    - name: Execute notebook 02
      run: |
        papermill notebooks/02_categorical_variables.ipynb \
                 notebooks/02_categorical_variables_out.ipynb
